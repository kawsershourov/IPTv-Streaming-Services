; PHP overrides read by CGI/FastCGI/PHP-FPM (the common cPanel setup).
; Raises upload limits so the GeoLite2 database (~7 MB) and media images can be
; uploaded through the admin panel. Changes may take a few minutes to apply
; (user_ini.cache_ttl). On mod_php hosts this file is ignored — use cPanel's
; "MultiPHP INI Editor" instead.
upload_max_filesize = 32M
post_max_size = 32M
max_execution_time = 120
